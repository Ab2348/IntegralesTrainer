<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Pruebas del nucleo</title>
    <style>
      body {
        margin: 32px;
        font-family: system-ui, sans-serif;
        color: #182026;
      }

      .pass {
        color: #19713d;
      }

      .fail {
        color: #a93b3b;
      }
    </style>
  </head>
  <body>
    <h1 id="status">Ejecutando...</h1>
    <pre id="details"></pre>
    <script src="../core.js"></script>
    <script>
      (function () {
        const Core = window.TrigCore;
        const details = document.getElementById("details");
        const status = document.getElementById("status");

        function assertEqual(actual, expected, label) {
          if (actual !== expected) {
            throw new Error(label + "\nEsperado: " + expected + "\nActual: " + actual);
          }
        }

        function correct(params) {
          return Core.buildExerciseFromParams(params, 4, Math.random).correctAnswer.displayExpression;
        }

        try {
          assertEqual(correct({ A: -6, k: -3, b: 4, familyId: "cos" }), "2 sin(-3x + 4) + C", "Caso 1");
          assertEqual(correct({ A: 5, k: 4, b: -7, familyId: "sin" }), "-5/4 cos(4x - 7) + C", "Caso 2");
          assertEqual(correct({ A: 8, k: -2, b: 5, familyId: "csc2" }), "4 cot(-2x + 5) + C", "Caso 3");
          assertEqual(correct({ A: -9, k: 3, b: 1, familyId: "sec2" }), "-3 tan(3x + 1) + C", "Caso 4");
          assertEqual(correct({ A: 6, k: -2, b: 3, familyId: "arctan" }), "-3 arctan(-2x + 3) + C", "Caso 5");
          assertEqual(correct({ A: 3, k: -2, b: 0, familyId: "tan" }), "3/2 ln |cos(-2x)| + C", "Caso 6");
          assertEqual(Core.formatArgumentPlain(Core.rational(3), Core.rational(-4)), "3x - 4", "Argumento 3x - 4");
          assertEqual(Core.formatArgumentPlain(Core.rational(1), Core.rational(0)), "x", "Argumento x");
          assertEqual(Core.formatArgumentPlain(Core.rational(-1), Core.rational(0)), "-x", "Argumento -x");
          assertEqual(Core.rationalPlain(Core.rational(-6, -4)), "3/2", "Racional reducido");

          Core.FAMILIES.forEach(function (family) {
            const exercise = Core.buildExerciseFromParams({ A: -6, k: -3, b: 4, familyId: family.id }, 4, Math.random);
            const correctOptions = exercise.options.filter(function (option) { return option.isCorrect; });
            const keys = new Set(exercise.options.map(function (option) { return option.key; }));
            assertEqual(correctOptions.length, 1, family.id + " correcta unica");
            assertEqual(keys.size, exercise.options.length, family.id + " opciones unicas");
          });

          status.textContent = "Pruebas aprobadas";
          status.className = "pass";
          details.textContent = "Casos matematicos, formato, racionales y duplicados verificados.";
        } catch (error) {
          status.textContent = "Pruebas fallidas";
          status.className = "fail";
          details.textContent = error.stack || String(error);
        }
      })();
    </script>
  </body>
</html>
